name: Rubber Hose Automation

on:
  schedule:
    # Runs at 9:30 AM EST (14:30 UTC)
    - cron: '30 14 * * *'
    # Runs at 4:30 PM EST (21:30 UTC)
    - cron: '30 21 * * *'
  workflow_dispatch: # This allows you to click a "Run" button to test it anytime

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg for MoviePy)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Libraries
        run: pip install groq edge-tts moviepy requests google-auth-oauthlib google-api-python-client

      - name: Run the Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_TOKEN_BASE64: ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
        run: python main.py

      - name: Save Memory Bank (history.txt)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.txt
          git commit -m "Automated: Update history log" || echo "No changes to commit"
          git push